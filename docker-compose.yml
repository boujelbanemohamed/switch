services:
  postgres:
    image: postgres:16-alpine
    container_name: switch-postgres
    environment:
      POSTGRES_DB: switch_db
      POSTGRES_USER: switch_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-switch_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U switch_user -d switch_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  switch-zookeeper:
    image: confluentinc/cp-zookeeper:7.7.1
    container_name: switch-zookeeper
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: switch-kafka
    depends_on:
      switch-zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: switch-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    container_name: switch-backend
    depends_on:
      postgres:
        condition: service_healthy
      switch-zookeeper:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/switch_db
      SPRING_DATASOURCE_USERNAME: switch_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-switch_pass}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SWITCH_AUTH_JWT_SECRET: ${JWT_SECRET}
      PAN_HASH_KEY: ${PAN_HASH_KEY}
      PCI_ENCRYPTION_KEY: ${PCI_ENCRYPTION_KEY}
      PIN_ENCRYPTION_KEY: ${PIN_ENCRYPTION_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8085:8085"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8085}
    container_name: switch-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
