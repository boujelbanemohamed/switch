server:
  port: 8085

spring:
  application:
    name: switch-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/switch_db
    username: switch_user
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true

  kafka:
    bootstrap-servers: localhost:9092
    admin:
      fail-fast: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      retries: 3
      properties:
        max.block.ms: 3000
        request.timeout.ms: 2000
        retry.backoff.ms: 500
    consumer:
      group-id: switch-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.switchplatform.platform.*"

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.starttls.enable: true
      mail.smtp.auth: true

  jackson:
    serialization:
      fail-on-empty-beans: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.switch: INFO
    org.springframework: WARN

switch:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  security:
    encryption:
      key: ${PCI_ENCRYPTION_KEY}
  iso8583:
    header: "ISO015000077"
    max-message-length: 4096
  iso20022:
    namespace: "urn:iso:std:iso:20022:tech:xsd"
  routing:
    rules-file: classpath:routing-rules.yml
  threads:
    core-pool-size: 10
    max-pool-size: 50
    queue-capacity: 100
  pan:
    hash-key: ${PAN_HASH_KEY}
  pin:
    encryption-key: ${PIN_ENCRYPTION_KEY:}

  notification:
    enabled: ${NOTIFICATIONS_ENABLED:false}

  mq:
    request-timeout: 5000
    retry-backoff: 100,500,2000

  fraud:
    time-window-hours: 24
    velocity-max-per-hour: 10

  auth:
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 3600000
      refresh-token-expiration: 86400000
